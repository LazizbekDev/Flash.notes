<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Note</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-full: 9999px;
        --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-height: 100vh;
      }
      body[data-theme='light'] {
        --bg: #f9fafb;
        --text: #111827;
        --text-muted: #6b7280;
        --card: #ffffff;
        --border: #e5e7eb;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }
      body[data-theme='dark'] {
        --bg: #111827;
        --text: #f9fafb;
        --text-muted: #9ca3af;
        --card: #1f2937;
        --border: #374151;
        --accent: #60a5fa;
        --accent-hover: #3b82f6;
        --danger: #ef4444;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      }
      header {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--text-muted);
        font-size: 14px;
      }
      
      /* Floating Controls */
      .floating-controls {
        display: flex;
        gap: 8px;
      }
      .btn-primary {
        flex: 1;
        padding: 12px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        font-size: 15px;
        border: none;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }
      .btn-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: var(--transition);
        color: var(--text);
      }
      .btn-icon:hover {
        background: var(--border);
      }

      /* Note Form */
      #note-form {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: var(--shadow);
      }
      #note-form label {
        font-size: 14px;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        min-height: 80px;
        padding: 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .form-actions {
        display: flex;
        justify-content: flex-end;
      }
      .btn-save {
        padding: 8px 16px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--radius-full);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
      }
      .btn-save:hover {
        background: var(--accent-hover);
      }

      /* Toolbar & Filters */
      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .search-box {
        position: relative;
      }
      .search-box input {
        width: 100%;
        padding: 10px 16px 10px 36px;
        border-radius: var(--radius-full);
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-family: inherit;
        font-size: 14px;
        box-sizing: border-box;
      }
      .search-box input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        width: 16px;
        height: 16px;
      }
      
      .filters-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .filter-select, .date-input {
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-size: 13px;
        font-family: inherit;
        outline: none;
        cursor: pointer;
      }
      .date-input {
        flex: 1;
        min-width: 110px;
      }
      
      /* Tabs */
      .tabs {
        display: flex;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 4px;
        gap: 4px;
      }
      .tab-btn {
        flex: 1;
        padding: 8px;
        background: transparent;
        border: none;
        border-radius: var(--radius-sm);
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
      }
      .tab-btn:hover {
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--bg);
        color: var(--text);
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      }

      /* Notes List */
      #notes-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .note-item {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: var(--shadow);
        transition: var(--transition);
      }
      .note-item:hover {
        border-color: #cbd5e1;
      }
      body[data-theme='dark'] .note-item:hover {
        border-color: #4b5563;
      }
      .floating-note-item {
        border-left: 4px solid var(--accent);
      }
      
      .note-content {
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
      }
      
      .note-meta {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .badge {
        padding: 2px 6px;
        border-radius: 4px;
        background: var(--bg);
        border: 1px solid var(--border);
        font-size: 11px;
      }
      
      .note-actions {
        display: flex;
        gap: 8px;
        border-top: 1px dashed var(--border);
        padding-top: 12px;
        margin-top: 4px;
      }
      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: none;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        transition: var(--transition);
      }
      .btn-ghost:hover {
        background: var(--bg);
        color: var(--text);
      }
      .btn-danger {
        color: var(--danger);
        margin-left: auto;
      }
      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.1);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
        background: var(--card);
        border: 1px dashed var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Flash Note</h1>
      <p>Quick notes, highlights & floating comments</p>
    </header>

    <section class="floating-controls">
      <button id="add-floating-note" class="btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        Add Floating Note
      </button>
      <button id="toggle-floating-notes" class="btn-icon" title="Toggle Visibility">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </section>

    <form id="note-form">
      <label for="note-text">Quick Note</label>
      <textarea id="note-text" placeholder="Type your thought..." required></textarea>
      <div class="form-actions">
        <button type="submit" class="btn-save">Save note</button>
      </div>
    </form>

    <section class="toolbar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="note-search" type="search" placeholder="Search notes..." autocomplete="off" />
      </div>
      
      <div class="tabs">
        <button class="tab-btn active" data-tab="all">All</button>
        <button class="tab-btn" data-tab="comments">Comments</button>
        <button class="tab-btn" data-tab="highlights">Highlights</button>
      </div>

      <div class="filters-row">
        <select id="sort-by" class="filter-select">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
        <input type="date" id="date-start" class="date-input" title="From date" />
        <input type="date" id="date-end" class="date-input" title="To date" />
      </div>
    </section>

    <section id="notes-list"></section>

    <script type="module" src="flashnote.js"></script>
  </body>
</html>
